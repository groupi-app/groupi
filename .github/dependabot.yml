version: 2
updates:
  # Root and all packages (pnpm monorepo)
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/packages/web'
      - '/packages/mobile'
      - '/packages/shared'
      - '/convex'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
    groups:
      # Group minor and patch updates together
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    labels:
      - 'ci'
      - 'dependencies'
