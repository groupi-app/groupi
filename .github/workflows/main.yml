name: Cypress E2E Tests

on:
  push:
    branches: [ test ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 20
    - run: npm install
    - run: npm run build
    - uses: vercel/actions/fetch-environment@v1
      with:
        project: prj_2QsZV5SuXDLJut4BlSWKspAAJo5Z
        environment: preview
        token: ${{ secrets.VERCEL_TOKEN }}
    - run: cypress run
